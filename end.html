<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The End | Orbital Technologies</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --void: #00000a;
      --mono: 'Share Tech Mono', monospace;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--void);
      font-family: 'Rajdhani', sans-serif;
    }

    
    #starCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

   
    #warpCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #warpFlash {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: white;
      opacity: 0;
      pointer-events: none;
      animation: warpFlash 7s ease-out forwards;
    }
    @keyframes warpFlash {
      0%   { opacity: 0.9; }
      0.5% { opacity: 0; }
      15%  { opacity: 0; }
      60%  { opacity: 0; }
      80%  { opacity: 0.15; }
      90%  { opacity: 0.4; }
      95%  { opacity: 0.8; }
      100% { opacity: 0; }
    }


    #speedLines {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 1;
      animation: fadeSpeedLines 7s ease-out forwards;
    }
    @keyframes fadeSpeedLines {
      0%   { opacity: 1; }
      85%  { opacity: 1; }
      100% { opacity: 0; }
    }
    #chromatic {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background: transparent;
      mix-blend-mode: screen;
      animation: chromaticPulse 7s ease-out forwards;
    }
    @keyframes chromaticPulse {
      0%   { box-shadow: inset 8px 0 20px rgba(255,0,100,0.3), inset -8px 0 20px rgba(0,200,255,0.3); }
      20%  { box-shadow: inset 14px 0 30px rgba(255,0,100,0.25), inset -14px 0 30px rgba(0,200,255,0.25); }
      60%  { box-shadow: inset 5px 0 15px rgba(255,0,100,0.15), inset -5px 0 15px rgba(0,200,255,0.15); }
      85%  { box-shadow: inset 2px 0 8px rgba(255,0,100,0.05), inset -2px 0 8px rgba(0,200,255,0.05); }
      100% { box-shadow: none; }
    }

    #tunnelRing {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      animation: tunnelFade 7s ease-out forwards;
    }
    @keyframes tunnelFade {
      0%   { opacity: 1; }
      85%  { opacity: 1; }
      100% { opacity: 0; }
    }
    .tunnel-circle {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(100,180,255,0.15);
      animation: tunnelExpand 0.6s linear infinite;
    }
    @keyframes tunnelExpand {
      0%   { width: 0; height: 0; opacity: 0.8; }
      100% { width: 300vmax; height: 300vmax; opacity: 0; }
    }

    #earth {
  position: fixed;
  right: 0%;             
  top: 50%;
  transform: translateY(-50%);
  
  width: 110vmin;          
  height: 110vmin;
  
  border-radius: 12%;
  background: url('earth.png') center/cover no-repeat;

  filter: blur(0px) brightness(1) saturate(1.05);

  z-index: 4;
  opacity: 0;

  animation: earthReveal 7s ease-out forwards;
}
    @keyframes earthReveal {
      0%   { opacity: 0; transform: translateY(-50%) scale(1.25); }
      85%  { opacity: 0; transform: translateY(-50%) scale(1.08); }
      100% { opacity: 1; transform: translateY(-50%) scale(1); }
    }

    #content {
      position: fixed;
      left: 7%;
      top: 42%;
      transform: translateY(-50%);
      z-index: 10;
      opacity: 0;
      animation: contentReveal 1.2s ease-out 7s forwards;
      max-width: 520px;
    }
    @keyframes contentReveal {
      0%   { opacity: 0; transform: translateY(-45%); }
      100% { opacity: 1; transform: translateY(-50%); }
    }

    .end-tag {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.32em;
      color: rgba(245,158,11,0.5);
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .end-tag::before {
      content: '';
      display: inline-block;
      width: 28px;
      height: 1px;
      background: rgba(245,158,11,0.5);
    }

    .end-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.8rem, 4vw, 4.2rem);
      font-weight: 900;
      line-height: 1.02;
      margin-bottom: 14px;
      background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 50%, #64748b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.04em;
    }

    .end-sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(1rem, 1.7vw, 1.2rem);
      color: rgba(255,255,255,0.9);
      line-height: 1.05;
      letter-spacing: 0.02em;
      margin-bottom: 44px;
      font-weight: 400;
    }

    .end-line {
      width: 42px;
      height: 1px;
      background: linear-gradient(to right, rgba(245,158,11,0.6), transparent);
      margin-bottom: 42px;
    }

    /* RETURN BUTTON */
    .return-btn {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 15px 34px;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(245,158,11,0.55);
      color: #fbbf24;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }
    .return-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(245,158,11,0.1) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    .return-btn:hover::before { opacity: 1; }
    .return-btn:hover {
      border-color: #fbbf24;
      box-shadow: 0 0 40px rgba(245,158,11,0.35), 0 0 80px rgba(245,158,11,0.1);
      transform: translateY(-2px);
      color: #fff;
    }
    .return-btn svg {
      transition: transform 0.3s ease;
    }
    .return-btn:hover svg { transform: translateX(-4px); }

    #coords {
      position: fixed;
      bottom: 32px;
      left: 7%;
      z-index: 10;
      font-family: var(--mono);
      font-size: 0.58rem;
      color: rgba(245,158,11,0.2);
      letter-spacing: 0.12em;
      line-height: 2;
      opacity: 0;
      animation: contentReveal 1s ease-out 7.4s forwards;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    }

    @media (max-width: 900px) {
      #earth {
        right: -10%;
        width: 75vmin;
        height: 75vmin;
        filter: blur(6px) brightness(0.95) saturate(1.05);
      }

      #content {
        left: 6%;
        top: 38%;
        max-width: 90vw;
      }
    }
  </style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<canvas id="warpCanvas"></canvas>
<canvas id="speedLines"></canvas>
<div id="warpFlash"></div>
<div id="chromatic"></div>
<div id="tunnelRing"></div>
<div id="earth"></div>
<div class="scanlines"></div>
<div class="vignette"></div>

<div id="content">
  <div class="end-tag">Mission Status — Complete</div>
  <div class="end-title">THE END</div>
  <div class="end-sub">The journey ends<br>But the cosmos will keep expanding</div>
  <div class="end-line"></div>
  <a href="index.html" class="return-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Return to Home
  </a>
</div>

<div id="coords">
  EPOCH: J2000.0 · RA 00h 00m 00s · DEC +00° 00' 00"<br>
  ORBITAL SEQUENCE TERMINATED · ALL SYSTEMS NOMINAL
</div>

<script>

(function () {
  const c = document.getElementById('starCanvas');
  const ctx = c.getContext('2d');

  function resize() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;

    ctx.clearRect(0, 0, c.width, c.height);
    for (let i = 0; i < 300; i++) {
      const x = Math.random() * c.width;
      const y = Math.random() * c.height;
      const r = Math.random() * 1.2 + 0.1;
      const o = Math.random() * 0.4 + 0.05;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${o})`;
      ctx.fill();
    }
  }

  resize();
  window.addEventListener('resize', resize);
})();

(function () {
  const c = document.getElementById('warpCanvas');
  const ctx = c.getContext('2d');
  let W, H, streaks = [];

  const startTime = performance.now();
  const WARP_DURATION = 7000;

  function resize() {
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
  }

  function makeStreak() {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 80 + 10;
    return {
      angle,
      dist,
      speed: Math.random() * 18 + 8,
      len: 0,
      width: Math.random() * 1.5 + 0.3,
      color: Math.random() > 0.6
        ? `rgba(${180 + Math.floor(Math.random() * 75)},${200 + Math.floor(Math.random() * 55)},255,`
        : `rgba(255,255,${200 + Math.floor(Math.random() * 55)},`,
      alpha: Math.random() * 0.6 + 0.2
    };
  }

  for (let i = 0; i < 400; i++) streaks.push(makeStreak());

  function getWarpIntensity(elapsed) {
    const t = elapsed / WARP_DURATION;
    if (t < 0.05) return t / 0.05;
    if (t < 0.75) return 1;
    return 1 - (t - 0.75) / 0.25;
  }

  function draw(ts) {
    const elapsed = ts - startTime;
    const intensity = Math.max(0, getWarpIntensity(elapsed));

    ctx.clearRect(0, 0, W, H);

    if (intensity > 0) {
      ctx.fillStyle = `rgba(0,0,10,${0.35 * intensity})`;
      ctx.fillRect(0, 0, W, H);
    }

    const cx = W / 2;
    const cy = H / 2;
    const speedMult = 1 + intensity * 5;

    streaks.forEach((s, i) => {
      s.dist += s.speed * speedMult * intensity;
      s.len = s.dist * 0.4 * intensity;

      const x1 = cx + Math.cos(s.angle) * s.dist;
      const y1 = cy + Math.sin(s.angle) * s.dist;
      const x0 = cx + Math.cos(s.angle) * Math.max(0, s.dist - s.len);
      const y0 = cy + Math.sin(s.angle) * Math.max(0, s.dist - s.len);

      const maxDist = Math.sqrt(W * W + H * H) / 2;
      if (s.dist > maxDist + 50) {
        streaks[i] = makeStreak();
        return;
      }

      const grad = ctx.createLinearGradient(x0, y0, x1, y1);
      grad.addColorStop(0, s.color + '0)');
      grad.addColorStop(1, s.color + (s.alpha * intensity) + ')');

      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.strokeStyle = grad;
      ctx.lineWidth = s.width * (1 + intensity);
      ctx.stroke();
    });

    if (elapsed < WARP_DURATION + 200) {
      requestAnimationFrame(draw);
    } else {
      ctx.clearRect(0, 0, W, H);
    }
  }

  resize();
  window.addEventListener('resize', resize);
  requestAnimationFrame(draw);
})();

(function () {
  const container = document.getElementById('tunnelRing');
  const WARP_DURATION = 7000;
  const start = Date.now();

  function spawnRing() {
    if (Date.now() - start > WARP_DURATION * 0.85) return;
    const el = document.createElement('div');
    el.className = 'tunnel-circle';
    const hue = Math.random() > 0.5 ? '200,220,255' : '255,240,180';
    el.style.borderColor = `rgba(${hue},0.12)`;
    const dur = 0.3 + Math.random() * 0.4;
    el.style.animationDuration = dur + 's';
    container.appendChild(el);
    setTimeout(() => el.remove(), dur * 1000 + 100);
  }

  const iv = setInterval(spawnRing, 80);
  setTimeout(() => clearInterval(iv), WARP_DURATION * 0.85);
})();
</script>
</body>
</html>
