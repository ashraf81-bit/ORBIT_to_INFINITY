    :root {
      --mono: 'Share Tech Mono', monospace;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Rajdhani', sans-serif;
      background: #000;
      cursor: default;
    }
    /* (All your existing beautiful CSS remains unchanged - only added the new section) */
    #warpOverlay {
      position: fixed; inset: 0; z-index: 9999;
      background: #000; opacity: 0; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
    }
    #warpOverlay.active { pointer-events: all; }
    #warpCanvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    .warp-text {
      position: relative; z-index: 2;
      font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 900;
      letter-spacing: 0.4em; text-transform: uppercase;
      color: rgba(255,255,255,0); text-align: center;
      transition: color 0.5s ease;
    }
    .warp-text.visible { color: rgba(255,255,255,0.9); }

    #sectionsWrap {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      overflow: hidden;
    }

    .planet-section {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.0s;
    }
    .planet-section.active {
      opacity: 1;
      pointer-events: all;
    }

    .sec-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      filter: blur(22px) brightness(0.38) saturate(1.2);
      transform: scale(1.08);
      z-index: 0;
    }

    .sec-vignette {
      position: absolute; inset: 0; z-index: 1;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.65) 100%);
    }

    #starsBg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    .planet-img-wrap {
      position: absolute;
      left: 4%; top: 50%;
      transform: translateY(-50%);
      width: 46vw; max-width: 600px;
      z-index: 5;
      filter: drop-shadow(0 0 60px var(--glow));
      animation: floatPlanet 8s ease-in-out infinite;
    }
    .planet-img-wrap img {
      width: 100%; height: 100%;
      object-fit: contain;
      border-radius: 50%;
    }
    @keyframes floatPlanet {
      0%,100% { transform: translateY(-50%) translateY(0px); }
      50% { transform: translateY(-50%) translateY(-16px); }
    }

    .ui-right {
      position: absolute;
      right: 3%; top: 50%;
      transform: translateY(-50%);
      width: 38vw; max-width: 440px;
      z-index: 6;
      display: flex; flex-direction: column; gap: 14px;
    }

    .title-block {
      position: absolute;
      left: 4%; top: 5%;
      z-index: 6;
      max-width: 44vw;
    }
    .planet-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 900; letter-spacing: 0.1em;
      color: #fff;
      text-shadow: 0 0 40px var(--glow), 0 0 80px var(--glow);
      line-height: 1;
      margin-bottom: 10px;
    }
    .planet-subtitle {
      font-family: var(--mono); font-size: 0.65rem;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--glow); opacity: 0.8;
      margin-bottom: 8px;
    }
    .cinematic-line {
      font-family: 'Rajdhani', sans-serif; font-size: 0.85rem;
      font-style: italic; color: rgba(255,255,255,0.55);
      line-height: 1.5; max-width: 360px;
    }

    .core-data-panel {
      background: rgba(0,0,0,0.72);
      border: 1px solid var(--glow);
      border-radius: 6px;
      padding: 14px 16px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .panel-header {
      font-family: var(--mono); font-size: 0.62rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--glow); margin-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding-bottom: 8px;
    }
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .stat-box {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px; padding: 8px 10px;
    }
    .stat-label {
      font-family: var(--mono); font-size: 0.52rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); display: block; margin-bottom: 3px;
    }
    .stat-value {
      font-family: var(--mono); font-size: 0.85rem;
      color: var(--glow); font-weight: bold;
    }
    .stat-box.wide { grid-column: span 2; }

    .detail-panel {
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px; padding: 14px 16px;
    }
    .detail-entry {
      font-family: 'Rajdhani', sans-serif; font-size: 0.92rem;
      color: var(--glow); margin-bottom: 4px; line-height: 1.5;
    }
    .detail-entry span {
      color: rgba(255,255,255,0.6);
    }

    .sig-box {
      position: absolute;
      left: 4%; bottom: 6%;
      width: 44vw; max-width: 540px;
      background: rgba(0,0,0,0.65);
      border: 1px solid var(--glow);
      border-radius: 6px; padding: 16px 20px;
      z-index: 6;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .sig-label {
      font-family: var(--mono); font-size: 0.55rem;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--glow); margin-bottom: 8px; opacity: 0.7;
    }
    .sig-text {
      font-family: 'Rajdhani', sans-serif; font-size: 1rem;
      color: rgba(255,255,255,0.75); line-height: 1.6; font-style: italic;
    }

    .nav-arrow {
      position: fixed; z-index: 100;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7); border-radius: 50%;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.4rem;
      transition: all 0.3s ease;
      user-select: none;
    }
    .nav-arrow:hover {
      background: rgba(255,255,255,0.12); color: #fff;
      border-color: rgba(255,255,255,0.4);
    }

    #navNext { left: 50%; top: 50%; transform: translate(92px, -50%); }

    .dots-nav {
      position: fixed; bottom: 22px; left: 50%;

      z-index: 100; display: flex; gap: 8px; align-items: center;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      cursor: pointer; transition: all 0.3s ease;
    }
    .dot.active {
      background: #fff; transform: scale(1.5);
      box-shadow: 0 0 8px rgba(255,255,255,0.8);
    }

    .section-counter {
      position: fixed; bottom: 46px; right: 32px;
      z-index: 100;
      font-family: var(--mono); font-size: 0.65rem;
      color: rgba(255,255,255,0.3); letter-spacing: 0.15em;

      background: rgba(0,0,0,0.8); backdrop-filter: blur(12px);

      transform: translateY(-2px);

  </style>
</head>

    const n = Math.floor(c.width * c.height / 3500);
    for(let i = 0; i < n; i++){
      stars.push({
        x: Math.random()*c.width, y: Math.random()*c.height,
        r: Math.random()*1.3+0.2,
        o: Math.random()*0.6+0.15,
        t: Math.random()*Math.PI*2, s: Math.random()*4+3
      });
    }
  }
  function draw(ts){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      const o = s.o*(0.55+0.45*Math.sin(ts*0.0006/s.s+s.t));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${o})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); window.addEventListener('resize',resize); requestAnimationFrame(draw);
})();


const wrap = document.getElementById('sectionsWrap');
SECTIONS.forEach((sec, idx) => {
  const el = document.createElement('div');
  el.className = 'planet-section';
  el.id = 'sec-' + sec.id;
  el.style.setProperty('--glow', sec.glow);

  const statsHTML = sec.stats.map(s =>
    `<div class="stat-box"><span class="stat-label">${s.label}</span><span class="stat-value">${s.value}</span></div>`
  ).join('');

  const detailsHTML = sec.details.map(d =>
    `<div class="detail-entry">${d.key}: <span>${d.val}</span></div>`
  ).join('');

  el.innerHTML = `
    <div class="sec-bg" style="background-image:url('${sec.image}')"></div>
    <div class="sec-vignette"></div>
    <div class="title-block">
      <div class="planet-subtitle">${sec.subtitle}</div>
      <div class="planet-title">${sec.name}</div>
      <div class="cinematic-line">${sec.sig.replace(/"/g,'')}</div>
    </div>
    <div class="planet-img-wrap">
      <img src="${sec.image}" alt="${sec.name}">
    </div>
    <div class="ui-right">
      <div class="core-data-panel">
        <div class="panel-header">CORE DATA</div>
        <div class="stats-grid">${statsHTML}</div>
      </div>
      <div class="detail-panel">${detailsHTML}</div>
    </div>
    <div class="sig-box">
      <div class="sig-label">SIGNIFICANCE</div>
      <div class="sig-text">${sec.sig}</div>
    </div>
  `;
  wrap.appendChild(el);
});


let current = 0;
const total = SECTIONS.length;
let isTransitioning = false;
const overlay = document.getElementById('transOverlay');
const counter = document.getElementById('sectionCounter');
const topLabel = document.getElementById('sectionNameTop');
const warpBtn = document.getElementById('warpBtn');

const dotsNav = document.getElementById('dotsNav');
SECTIONS.forEach((_, i) => {
  const d = document.createElement('div'); d.className = 'dot';
  d.addEventListener('click', () => goTo(i));
  dotsNav.appendChild(d);
});

function goTo(idx) {
  if(isTransitioning || idx === current) return;
  if(idx < 0 || idx >= total) return;
  isTransitioning = true;
  overlay.classList.add('fade');
  setTimeout(() => {
    document.querySelector('.planet-section.active')?.classList.remove('active');
    current = idx;
    showSection();
    overlay.classList.remove('fade');
    setTimeout(() => { isTransitioning = false; }, 380);
  }, 360);
}

function showSection() {
  const sec = SECTIONS[current];
  const el = document.getElementById('sec-' + sec.id);
  el.classList.add('active');

  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===current));

  counter.textContent = String(current+1).padStart(2,'0') + ' / ' + String(total).padStart(2,'0');
  topLabel.textContent = sec.name + ' · ' + sec.subtitle;

  warpBtn.style.display = current === total - 1 ? 'flex' : 'none';

  document.getElementById('navPrev').style.opacity = current === 0 ? '0.2' : '1';
  document.getElementById('navNext').style.opacity = current === total-1 ? '0.2' : '1';
}

/* Init */
document.getElementById('sec-' + SECTIONS[0].id).classList.add('active');
showSection();

/* Controls */
document.getElementById('navPrev').addEventListener('click', () => goTo(current-1));
document.getElementById('navNext').addEventListener('click', () => goTo(current+1));

document.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current+1);
  if(e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(current-1);
});

let wheelCooldown = false;
window.addEventListener('wheel', e => {
  if(wheelCooldown) return;
  wheelCooldown = true;
  setTimeout(() => { wheelCooldown = false; }, 900);
  if(e.deltaY > 0) goTo(current+1);
  else goTo(current-1);
}, { passive: true });

let touchStartX = 0, touchStartY = 0;
window.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

window.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > Math.abs(dy)){
    if(dx < -40) goTo(current+1);
    if(dx > 40) goTo(current-1);
  } else {
    if(dy < -40) goTo(current+1);
    if(dy > 40) goTo(current-1);
  }
}, { passive: true });

/* ====================== WARP ANIMATION ====================== */
(function(){
  const warpOverlay = document.getElementById('warpOverlay');
  const warpCanvas = document.getElementById('warpCanvas');
  const warpText = document.getElementById('warpText');
  const ctx = warpCanvas.getContext('2d');
  let W, H, stars = [], animFrame, startTime, running = false;

  function resize(){
    W = warpCanvas.width = window.innerWidth;
    H = warpCanvas.height = window.innerHeight;
  }

  function buildWarpStars(){
    stars = [];
    for(let i = 0; i < 500; i++){
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.random() * Math.min(W,H) * 0.5;
      stars.push({
        x: W/2 + Math.cos(angle)*dist,
        y: H/2 + Math.sin(angle)*dist,
        ox: W/2 + Math.cos(angle)*dist,
        oy: H/2 + Math.sin(angle)*dist,
        angle, speed: Math.random()*3+1,
        size: Math.random()*1.5+0.4,
        brightness: Math.random()
      });
    }
  }

  function drawWarp(t){
    if(!running) return;
    const elapsed = (t - startTime) / 1000;
    const progress = Math.min(elapsed / 3.5, 1);
    ctx.fillStyle = `rgba(0,0,0,${progress < 0.1 ? progress*5 : 0.18})`;
    ctx.fillRect(0,0,W,H);
    const speed = Math.pow(progress, 2) * 80;
    stars.forEach(s => {
      const dx = s.ox - W/2;
      const dy = s.oy - H/2;
      const len = Math.sqrt(dx*dx+dy*dy);
      const nx = dx/len; const ny = dy/len;
      s.x += nx * speed * 0.016 * 60;
      s.y += ny * speed * 0.016 * 60;
      const trailLen = speed * 0.4;
      const alpha = Math.min(1, progress * 3) * (0.4 + s.brightness * 0.6);
      ctx.beginPath();
      ctx.moveTo(s.x - nx*trailLen, s.y - ny*trailLen);
      ctx.lineTo(s.x, s.y);
      ctx.strokeStyle = `rgba(180,220,255,${alpha})`;
      ctx.lineWidth = s.size;
      ctx.stroke();
      if(s.x < 0 || s.x > W || s.y < 0 || s.y > H){
        s.x = s.ox; s.y = s.oy;
      }
    });
    if(progress > 0.85){
      const flashAlpha = (progress - 0.85) / 0.15;
      ctx.fillStyle = `rgba(255,255,255,${flashAlpha * 0.9})`;
      ctx.fillRect(0,0,W,H);
    }
    if(elapsed < 3.5){
      animFrame = requestAnimationFrame(drawWarp);
    } else {
      window.location.href = 'To_infinity.html';
    }
  }

  document.getElementById('warpBtn').addEventListener('click', () => {
    running = true;
    resize(); buildWarpStars();
    warpOverlay.style.opacity = '1';
    warpOverlay.classList.add('active');
    ctx.clearRect(0,0,W,H);
    setTimeout(() => { warpText.classList.add('visible'); }, 900);
    setTimeout(() => { warpText.classList.remove('visible'); }, 2500);
    startTime = performance.now();
    animFrame = requestAnimationFrame(drawWarp);
  });

  window.addEventListener('resize', () => { if(running) resize(); });
})();
</script>
</body>
